<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Tables</title>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th colspan="7" rowspan="2">Column 1</th>
          <th colspan="4" rowspan="2">Column 2</th>
          <th class="col3" colspan="6">Column 3</th>
        </tr>
        <tr>
          <th colspan="3">Column 3a</th>
          <th colspan="3">Column 3b</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="4" rowspan="2">Row1</td>
          <td colspan="3">Row 1a</td>
          <td colspan="4">123456</td>
          <td colspan="3">123456</td>
          <td colspan="3">123456</td>
        </tr>
        <tr>
          <td colspan="3">Row 2b</td>
          <td colspan="4">123456</td>
          <td colspan="3">123456</td>
          <td colspan="3">123456</td>
        </tr>
        <tr>
          <td colspan="7">Row 2</td>
          <td colspan="4">123456</td>
          <td colspan="3">123456</td>
          <td colspan="3">123456</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
